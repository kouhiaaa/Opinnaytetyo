    reference: "def count_down(n):\n    while n > 0:\n        print(n)\n        n -= 1"
    tags: [python, bugs, infinite-loop]

  - id: cd_early_return
    category: code_debugging
    prompt: "Find and fix the bug in this Python function:\n\ndef find_max(lst):\n    max_val = lst[0]\n    for num in lst:\n        if num > max_val:\n            max_val = num\n        return max_val\n\nReturn only the corrected function definition."
    reference: "def find_max(lst):\n    max_val = lst[0]\n    for num in lst:\n        if num > max_val:\n            max_val = num\n    return max_val"
    tags: [python, bugs, indentation]

  - id: cd_wrong_condition
