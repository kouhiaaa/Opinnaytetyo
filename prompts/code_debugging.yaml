    reference: "def clamp(value, lo, hi):\n    if value < lo:\n        return lo\n    if value > hi:\n        return hi\n    return value"
    tags: [python, bugs, logic]

  - id: cd_missing_base_case
    category: code_debugging
    prompt: "Find and fix the bug in this Python function:\n\ndef sum_digits(n):\n    return n % 10 + sum_digits(n // 10)\n\nReturn only the corrected function definition."
    reference: "def sum_digits(n):\n    if n < 10:\n        return n\n    return n % 10 + sum_digits(n // 10)"
    tags: [python, bugs, recursion]

