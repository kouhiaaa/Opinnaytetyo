prompts:
  - id: cd_off_by_one
    category: code_debugging
    prompt: "Find and fix the bug in this Python function:\n\ndef sum_list(lst):\n    total = 0\n    for i in range(1, len(lst)):\n        total += lst[i]\n    return total\n\nReturn only the corrected function definition."
    reference: "def sum_list(lst):\n    total = 0\n    for i in range(len(lst)):\n        total += lst[i]\n    return total"
    tags: [python, bugs, off-by-one]

  - id: cd_mutable_default
    category: code_debugging
    prompt: "Find and fix the bug in this Python function:\n\ndef append_item(item, lst=[]):\n    lst.append(item)\n    return lst\n\nReturn only the corrected function definition."
    reference: "def append_item(item, lst=None):\n    if lst is None:\n        lst = []\n    lst.append(item)\n    return lst"
    tags: [python, bugs, mutable-default]

  - id: cd_infinite_loop
